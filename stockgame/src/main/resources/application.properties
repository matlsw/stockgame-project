# Server - Render gibt den Port automatisch vor
server.port=${PORT:8080}

# H2 Database
spring.datasource.url=jdbc:h2:mem:stockgamedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (nur lokal)
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET:MeinSuperGeheimerJWTSchluesselFuerStockGame2024!}
jwt.expiration=86400000

# Alpha Vantage API Key - als Umgebungsvariable setzen!
alphavantage.api.key=QF7KUQ5EUXO3KRBE

# Startkapital
game.starting.balance=10000.0
